name: generate snake animation

on:
  schedule:
    - cron: "0 0 * * *" # roda uma vez por dia
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate github-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#F0C99B&color_dots=#161B1C,#4A3420,#7A4A24,#B97A3E,#DDA366
            dist/github-snake-dark.svg?color_snake=#F0C99B&color_dots=#161B1C,#4A3420,#7A4A24,#B97A3E,#DDA366

      - name: push github-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
